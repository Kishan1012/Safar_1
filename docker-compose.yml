version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: romy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: romy_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: romy_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U romy_user -d romy_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: romy_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  typesense:
    image: typesense/typesense:0.25.2
    container_name: romy_typesense
    restart: unless-stopped
    ports:
      - '8108:8108'
    volumes:
      - typesense_data:/data
    command: '--data-dir /data --api-key=romy-local-key --enable-cors'

volumes:
  postgres_data:
  redis_data:
  typesense_data:
